<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Blast TON Miner - Зарабатывай TON</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            user-select: none;
            touch-action: none;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 10px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }
        
        .game-container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(15, 15, 26, 0.95);
            border-radius: 30px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        /* Панель статистики */
        .stats-panel {
            background: rgba(26, 26, 46, 0.95);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        
        .stat-card {
            background: rgba(15, 15, 26, 0.8);
            border-radius: 15px;
            padding: 8px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }
        
        /* Игровое поле */
        .board-container {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        canvas {
            background: #0a0a12;
            border-radius: 15px;
            box-shadow: 0 0 0 2px #2a2a3e;
            width: 100%;
            height: auto;
            cursor: pointer;
        }
        
        /* Блоки */
        .blocks-panel {
            background: rgba(26, 26, 46, 0.95);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .blocks-title {
            text-align: center;
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .blocks-container {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .block-option {
            background: rgba(15, 15, 26, 0.8);
            border-radius: 15px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .block-option.selected {
            border-color: #ffd700;
            background: #1a1a2e;
            transform: scale(1.05);
        }
        
        .block-option:active {
            transform: scale(0.95);
        }
        
        .mini-canvas {
            background: #0a0a12;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
        }
        
        /* Кнопки */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        button {
            background: linear-gradient(135deg, #2a2a3e 0%, #1a1a2e 100%);
            border: none;
            padding: 12px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        button:active {
            transform: scale(0.96);
        }
        
        .stop-btn {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            width: 100%;
            padding: 15px;
            font-size: 18px;
            animation: pulse 1s infinite;
        }
        
        .buy-btn {
            background: linear-gradient(135deg, #fee140 0%, #fa709a 100%);
            color: #000;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        
        @media (max-width: 450px) {
            .stat-value { font-size: 14px; }
            button { padding: 10px; font-size: 12px; }
            .mini-canvas { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="stats-panel">
        <div class="stat-card"><div class="stat-label">🏆 СЧЁТ</div><div class="stat-value" id="score">0</div></div>
        <div class="stat-card"><div class="stat-label">⏱️ ВРЕМЯ</div><div class="stat-value" id="timer">60</div></div>
        <div class="stat-card"><div class="stat-label">💰 TON</div><div class="stat-value" id="tonAmount">0</div></div>
        <div class="stat-card"><div class="stat-label">⭐ ЗВЁЗДЫ</div><div class="stat-value" id="stars">0</div></div>
    </div>
    
    <div class="board-container">
        <canvas id="boardCanvas" width="320" height="320"></canvas>
    </div>
    
    <div class="blocks-panel">
        <div class="blocks-title">📦 ВЫБЕРИ БЛОК И НАЖМИ НА ПОЛЕ</div>
        <div class="blocks-container" id="blocksContainer"></div>
    </div>
    
    <div class="action-buttons">
        <button id="buyTimeBtn" class="buy-btn">⭐ +20 СЕК (5⭐)</button>
        <button id="resetBtn" class="buy-btn">🔄 НОВАЯ ИГРА</button>
    </div>
    
    <button id="stopBtn" class="stop-btn">🛑 СТОП - ЗАБРАТЬ TON 🛑</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    // ========== НАСТРОЙКИ ==========
    const BOARD_SIZE = 8;
    let CELL_SIZE = 40;
    
    let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
    let currentBlocks = [];
    let selectedBlockIndex = 0;
    let score = 0;
    let timeLeft = 60;
    let gameActive = true;
    let stars = 0;
    let timerInterval;
    
    // Фигуры как в Block Blast
    const SHAPES = [
        { shape: [[1]], color: '#ff6b6b' },
        { shape: [[1, 1]], color: '#4ecdc4' },
        { shape: [[1], [1]], color: '#45b7d1' },
        { shape: [[1, 1], [1, 1]], color: '#96ceb4' },
        { shape: [[1, 0], [1, 1]], color: '#ffeaa7' },
        { shape: [[0, 1], [1, 1]], color: '#dfe6e9' },
        { shape: [[1, 1, 1]], color: '#fd79a8' },
        { shape: [[1], [1], [1]], color: '#e84393' },
        { shape: [[0, 1, 0], [1, 1, 1]], color: '#6c5ce7' }
    ];
    
    function getRandomBlock() {
        return JSON.parse(JSON.stringify(SHAPES[Math.floor(Math.random() * SHAPES.length)]));
    }
    
    function generateBlocks() {
        currentBlocks = [];
        for (let i = 0; i < 3; i++) {
            currentBlocks.push(getRandomBlock());
        }
        renderBlocks();
    }
    
    // ========== ОТРИСОВКА ==========
    const canvas = document.getElementById('boardCanvas');
    const ctx = canvas.getContext('2d');
    CELL_SIZE = canvas.width / BOARD_SIZE;
    
    function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                if (board[y][x] !== 0) {
                    ctx.fillStyle = board[y][x];
                    ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                } else {
                    ctx.strokeStyle = '#2a2a3e';
                    ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                }
            }
        }
    }
    
    function renderBlocks() {
        const container = document.getElementById('blocksContainer');
        container.innerHTML = '';
        
        currentBlocks.forEach((block, idx) => {
            const blockDiv = document.createElement('div');
            blockDiv.className = 'block-option';
            if (idx === selectedBlockIndex) blockDiv.classList.add('selected');
            
            const size = 70;
            const blockCanvas = document.createElement('canvas');
            blockCanvas.width = size;
            blockCanvas.height = size;
            blockCanvas.className = 'mini-canvas';
            const blockCtx = blockCanvas.getContext('2d');
            
            const shape = block.shape;
            const shapeRows = shape.length;
            const shapeCols = shape[0].length;
            const cellW = size / shapeCols;
            const cellH = size / shapeRows;
            
            blockCtx.fillStyle = '#0a0a12';
            blockCtx.fillRect(0, 0, size, size);
            
            for (let y = 0; y < shapeRows; y++) {
                for (let x = 0; x < shapeCols; x++) {
                    if (shape[y][x]) {
                        blockCtx.fillStyle = block.color;
                        blockCtx.fillRect(x * cellW, y * cellH, cellW - 2, cellH - 2);
                    }
                }
            }
            
            blockDiv.appendChild(blockCanvas);
            blockDiv.onclick = () => {
                selectedBlockIndex = idx;
                renderBlocks();
            };
            
            container.appendChild(blockDiv);
        });
    }
    
    // ========== ИГРОВАЯ ЛОГИКА ==========
    function canPlaceBlock(block, startX, startY) {
        const shape = block.shape;
        for (let y = 0; y < shape.length; y++) {
            for (let x = 0; x < shape[y].length; x++) {
                if (shape[y][x]) {
                    const boardX = startX + x;
                    const boardY = startY + y;
                    if (boardX >= BOARD_SIZE || boardY >= BOARD_SIZE || board[boardY][boardX] !== 0) {
                        return false;
                    }
                }
            }
        }
        return true;
    }
    
    function placeBlock(block, startX, startY) {
        const shape = block.shape;
        for (let y = 0; y < shape.length; y++) {
            for (let x = 0; x < shape[y].length; x++) {
                if (shape[y][x]) {
                    board[startY + y][startX + x] = block.color;
                }
            }
        }
        
        currentBlocks.splice(selectedBlockIndex, 1);
        if (currentBlocks.length === 0) {
            generateBlocks();
        }
        selectedBlockIndex = 0;
        
        clearLines();
        renderBlocks();
        drawBoard();
        checkGameOver();
    }
    
    function clearLines() {
        let linesCleared = 0;
        
        for (let y = 0; y < BOARD_SIZE; y++) {
            let full = true;
            for (let x = 0; x < BOARD_SIZE; x++) {
                if (board[y][x] === 0) { full = false; break; }
            }
            if (full) {
                for (let x = 0; x < BOARD_SIZE; x++) board[y][x] = 0;
                linesCleared++;
            }
        }
        
        for (let x = 0; x < BOARD_SIZE; x++) {
            let full = true;
            for (let y = 0; y < BOARD_SIZE; y++) {
                if (board[y][x] === 0) { full = false; break; }
            }
            if (full) {
                for (let y = 0; y < BOARD_SIZE; y++) board[y][x] = 0;
                linesCleared++;
            }
        }
        
        if (linesCleared > 0) {
            const points = [0, 100, 250, 500, 1000, 2000, 3500, 5000];
            const addScore = points[Math.min(linesCleared, 7)];
            score += addScore;
            updateUI();
            drawBoard();
        }
    }
    
    function checkGameOver() {
        for (let i = 0; i < currentBlocks.length; i++) {
            const block = currentBlocks[i];
            for (let y = 0; y <= BOARD_SIZE - block.shape.length; y++) {
                for (let x = 0; x <= BOARD_SIZE - block.shape[0].length; x++) {
                    if (canPlaceBlock(block, x, y)) return;
                }
            }
        }
        gameOver();
    }
    
    function gameOver() {
        gameActive = false;
        if (timerInterval) clearInterval(timerInterval);
        tg.sendData(JSON.stringify({ action: "game_over", score: score }));
        tg.showAlert("💀 ИГРА ОКОНЧЕНА! Нет доступных ходов!");
    }
    
    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('tonAmount').innerText = (score * 0.001).toFixed(3);
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('stars').innerText = stars;
    }
    
    // ========== КЛИК ПО ПОЛЮ ==========
    canvas.addEventListener('click', (e) => {
        if (!gameActive) return;
        
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        const canvasX = (clientX - rect.left) * scaleX;
        const canvasY = (clientY - rect.top) * scaleY;
        
        const cellX = Math.floor(canvasX / CELL_SIZE);
        const cellY = Math.floor(canvasY / CELL_SIZE);
        
        if (cellX >= 0 && cellX < BOARD_SIZE && cellY >= 0 && cellY < BOARD_SIZE) {
            const selectedBlock = currentBlocks[selectedBlockIndex];
            if (selectedBlock && canPlaceBlock(selectedBlock, cellX, cellY)) {
                placeBlock(selectedBlock, cellX, cellY);
            }
        }
    });
    
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const canvasX = (touch.clientX - rect.left) * scaleX;
        const canvasY = (touch.clientY - rect.top) * scaleY;
        
        const cellX = Math.floor(canvasX / CELL_SIZE);
        const cellY = Math.floor(canvasY / CELL_SIZE);
        
        if (cellX >= 0 && cellX < BOARD_SIZE && cellY >= 0 && cellY < BOARD_SIZE) {
            const selectedBlock = currentBlocks[selectedBlockIndex];
            if (selectedBlock && canPlaceBlock(selectedBlock, cellX, cellY)) {
                placeBlock(selectedBlock, cellX, cellY);
            }
        }
    });
    
    // ========== ТАЙМЕР ==========
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (gameActive && timeLeft > 0) {
                timeLeft--;
                updateUI();
                if (timeLeft <= 0) {
                    gameActive = false;
                    clearInterval(timerInterval);
                    tg.sendData(JSON.stringify({ action: "time_out", score: score }));
                    tg.showAlert("💀 ВРЕМЯ ВЫШЛО! Все очки потеряны!");
                }
            }
        }, 1000);
    }
    
    // ========== НОВАЯ ИГРА ==========
    function initGame() {
        board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        score = 0;
        timeLeft = 60;
        gameActive = true;
        updateUI();
        generateBlocks();
        drawBoard();
        startTimer();
    }
    
    function resetGame() {
        if (confirm("Начать новую игру?")) {
            if (timerInterval) clearInterval(timerInterval);
            initGame();
        }
    }
    
    // ========== КНОПКИ ==========
    document.getElementById('stopBtn').onclick = () => {
        if (gameActive) {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            const tonAmount = score * 0.001;
            tg.sendData(JSON.stringify({ action: "cashout", ton_amount: tonAmount, score: score }));
            tg.showAlert(`🎉 ТЫ ЗАБРАЛ ${tonAmount.toFixed(3)} TON!`);
            setTimeout(() => tg.close(), 2000);
        }
    };
    
    document.getElementById('buyTimeBtn').onclick = () => {
        if (stars >= 5) {
            stars -= 5;
            timeLeft += 20;
            updateUI();
            tg.showAlert(`✅ +20 секунд! Осталось звёзд: ${stars}`);
        } else {
            tg.sendData(JSON.stringify({ action: "buy_time" }));
            tg.showAlert("⭐ Не хватает звёзд! Купи в боте: /buy_20s");
        }
    };
    
    document.getElementById('resetBtn').onclick = () => resetGame();
    
    // Старт
    initGame();
</script>
</body>
</html>
